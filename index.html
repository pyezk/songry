<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>songry</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <iframe
      src="https://www.youtube-nocookie.com/embed/gbym6O5XRmA?autoplay=1&mute=1&controls=0&rel=0&playsinline=1"
      title="YouTube video player"
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
